spring.application.name=Scheduler Backend

# ?? Datasource ????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/interview_db_local
spring.datasource.username=postgres
spring.datasource.password=Applemaths2@
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? Connection pool (HikariCP) ????????????????????????????????????????????????
# Without these, idle connections are dropped by the DB after ~10 min
# causing "connection closed" errors that look like data loss on the frontend.
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
# Re-validates the connection before handing it to Hibernate
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=300000

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
# NEVER use create / create-drop / update in production ? Flyway owns the schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Prevent n+1 issues from causing slow queries that timeout and look like missing data
spring.jpa.properties.hibernate.default_batch_fetch_size=16
# Keep open-in-view OFF ? forces explicit transaction boundaries and avoids lazy-load surprises
spring.jpa.open-in-view=false

# ?? Flyway ????????????????????????????????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# !! DO NOT set spring.flyway.repair=true here permanently !!
# flyway.repair resets failed migration checksums and can cause migrations to
# re-run, which will DROP TABLE ... CASCADE your data. Only run repair manually:
#   ./mvnw flyway:repair   (one-time CLI command)
spring.flyway.repair=false
# Fail fast if a migration script has been edited after it was already applied.
# This protects against accidentally wiping data with a re-run migration.
spring.flyway.validate-on-migrate=true

# ?? Security / JWT ????????????????????????????????????????????????????????????
jwt.secret=159f8eb92b8df3d32ccc2e80292edd5a9aae00269cac9f5fdfe02469e55e8ebf
# 10 days in milliseconds ? long enough that users stay logged in across weekends
jwt.expiration-ms=864000000

# ?? Mail ??????????????????????????????????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=8080

# ?? Logging ???????????????????????????????????????????????????????????????????
# Keep security debug OFF in production ? it logs every request and fills disk
logging.level.org.springframework.security=WARN
logging.level.com.nemal.security=INFO
logging.level.com.nemal=INFO
# Uncomment temporarily when debugging availability issues:
# logging.level.com.nemal.service.HRAvailabilityService=DEBUG
# logging.level.com.nemal.service.AvailabilityService=DEBUG